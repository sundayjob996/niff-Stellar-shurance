name: Backend CI

# Runs on every push/PR that touches the backend directory.
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (fail on warnings)
        run: npm run lint

  # ── 2. Build ─────────────────────────────────────────────────────────────────
  build:
    name: TypeScript build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build (nest build)
        run: npm run build

  # ── 3. Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start Redis
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y redis-server
          sudo systemctl start redis-server
          redis-cli ping

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test

  # ── 4. Dependency audit ───────────────────────────────────────────────────────
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies (fail on high/critical)
        run: npm audit --audit-level=high --omit=dev

  # ── 5. Env example + docs drift guard ────────────────────────────────────────
  env-check:
    name: .env.example and env docs drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check .env.example and docs/environment-variables.md are up to date
        run: npm run env:example:check

  # ── 6. Error catalog integrity ────────────────────────────────────────────────
  error-catalog:
    name: Error catalog integrity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check error codes are unique and documented
        run: npm run error-catalog:check

  # ── 7. No legacy imports guard ────────────────────────────────────────────────
  no-legacy-imports:
    name: No legacy imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure no active NestJS files import from deleted legacy paths
        run: |
          # Patterns that indicate a file is importing from the deleted legacy layer.
          # These paths no longer exist; any import is a regression.
          PATTERNS=(
            "from.*middleware/errorHandler"
            "from.*middleware/auth['\"]"
            "from.*middleware/role"
            "from.*middleware/rateLimit"
            "from.*services/jwt"
            "from.*services/user"
            "from.*services/policy\.service"
            "from.*config/index['\"]"
            "from.*config/database"
            "from.*db/store"
            "from.*db/seed"
            "from.*entities/index"
            "from.*repositories/policy\.repository"
            "from.*horizon-rate-limit\.service['\"]"
          )

          found=0
          for pattern in "${PATTERNS[@]}"; do
            matches=$(grep -rn --include="*.ts" "$pattern" backend/src/ 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::error::Legacy import detected — $pattern"
              echo "$matches"
              found=$((found + 1))
            fi
          done

          if [ "$found" -gt 0 ]; then
            echo "::error::$found legacy import pattern(s) found. Remove them before merging."
            exit 1
          fi
          echo "✅ No legacy imports detected"
