name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ── Frontend quality gate ─────────────────────────────────────────────────
  frontend:
    name: Frontend (lint → typecheck → build → test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Lint (fail on warnings)
        run: npm run lint -- --max-warnings=0

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check docs internal links
        run: node scripts/check-docs-links.js

      - name: Check generated OpenAPI types are up to date
        run: |
          npm run generate-client
          if ! git diff --exit-code src/lib/api/generated/openapi.d.ts; then
            echo "::error::Generated types are stale. Run 'make generate-client' locally and commit the updated file."
            exit 1
          fi

  # ── Event dictionary sync guard ──────────────────────────────────────────
  check-event-dictionary:
    name: Event dictionary sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check every event in events.rs has a dictionary entry
        run: |
          # Extract event names from #[contractevent] macro topic strings in events.rs
          EVENT_RS=contracts/niffyinsure/src/events.rs
          DICT=EVENT_DICTIONARY.md

          # Collect the second topic (event name) from each #[contractevent(...)] line
          missing=0
          while IFS= read -r name; do
            if ! grep -qF "\"${name}\"" "$DICT" && ! grep -qF "\`${name}\`" "$DICT"; then
              echo "::error file=${EVENT_RS}::Event '${name}' is defined in events.rs but has no entry in EVENT_DICTIONARY.md"
              missing=$((missing + 1))
            fi
          done < <(grep -oP '(?<=#\[contractevent\(topics = \[")[^"]+(?=",\s*")[^"]*(?="\])' "$EVENT_RS" | \
                   grep -oP '(?<=", ")[^"]+')

          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing event(s) missing from EVENT_DICTIONARY.md. Add entries and re-push."
            exit 1
          fi
          echo "✅ All events in events.rs are documented in EVENT_DICTIONARY.md"

  # ── Soroban ABI golden-vector drift guard ────────────────────────────────
  golden-vectors:
    name: Soroban ABI golden vectors
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(toJson(github.event.pull_request.changed_files), 'contracts/') ||
      contains(toJson(github.event.pull_request.changed_files), 'backend/src/soroban/') ||
      contains(toJson(github.event.pull_request.changed_files), 'backend/src/tx/')
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: npm install

      - name: Run golden-vector encoding tests
        run: npx jest --testPathPattern="golden-vectors" --no-coverage

      - name: Verify vectors are up-to-date (no uncommitted drift)
        run: |
          npx ts-node ../scripts/refresh-vectors.ts
          if ! git diff --exit-code backend/src/soroban/golden-vectors.json; then
            echo "::error::golden-vectors.json is stale. Run 'npm run refresh-vectors' locally, review the diff, and commit the updated file."
            exit 1
          fi

  # ── Smart contract (Rust / Soroban) ──────────────────────────────────────
  contract:
    name: Contract (Rust / Soroban)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Cargo dependencies (fail on high/critical)
        run: cargo audit --deny warnings

      - name: Run contract tests
        run: cargo test --workspace --features testutils

      - name: Build WASM (release)
        run: cargo build --release --target wasm32-unknown-unknown --workspace

  # ── Backend unit tests ────────────────────────────────────────────────────
  unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start Redis
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y redis-server
          sudo systemctl start redis-server
          redis-cli ping

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Run unit tests
        run: npm test

      - name: Check .env.example is up to date
        run: npm run env:example:check

      - name: Check OpenAPI spec is up to date
        run: |
          npm run export-spec
          if ! git diff --exit-code openapi.json; then
            echo "::error::backend/openapi.json is stale. Run 'make generate-client' locally and commit the updated file."
            exit 1
          fi

  # ── Playwright E2E tests ──────────────────────────────────────────────────
  e2e-tests:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    # All E2E specs mock the backend via page.route() — no real Stellar network
    # or backend process is required. Set NEXT_PUBLIC_API_URL to a placeholder
    # so the app's getConfig() resolves without error; requests are intercepted
    # by Playwright before they reach the network.
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
      NEXT_PUBLIC_EXPLORER_BASE: https://stellar.expert/explorer/testnet/tx
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=html

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 14

  # ── Accessibility (axe) ───────────────────────────────────────────────────
  accessibility:
    name: Accessibility (axe / Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run axe accessibility checks
        run: npx playwright test tests/accessibility.spec.ts --reporter=list
        env:
          BASE_URL: http://localhost:3000

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: axe-report-${{ github.sha }}
          path: frontend/playwright-report/
          retention-days: 14

  # ── Database migrations verification ────────────────────────────────────────
  migrations:
    name: Database migrations verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_niffyinsure
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Verify migration lock file consistency
        run: |
          # Check if migration_lock.toml exists and is valid
          if [ ! -f prisma/migrations/migration_lock.toml ]; then
            echo "::error::Migration lock file missing"
            exit 1
          fi
          
          # Verify lock file contains expected provider
          if ! grep -q "provider = \"postgresql\"" prisma/migrations/migration_lock.toml; then
            echo "::error::Migration lock file has incorrect provider"
            exit 1
          fi

      - name: Check migration history consistency
        run: |
          # Verify all migration directories have migration.sql
          for dir in prisma/migrations/*/; do
            if [ ! -f "$dir/migration.sql" ]; then
              echo "::error::Migration directory $dir missing migration.sql"
              exit 1
            fi
          done

      - name: Run migrations against fresh database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_niffyinsure
        run: |
          npx prisma migrate deploy
          echo "✅ All migrations applied successfully"

      - name: Check migration status
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_niffyinsure
        run: |
          STATUS_OUTPUT=$(npx prisma migrate status)
          if echo "$STATUS_OUTPUT" | grep -q "No pending migrations"; then
            echo "✅ No pending migrations"
          else
            echo "::error::Pending migrations detected:"
            echo "$STATUS_OUTPUT"
            exit 1
          fi

      - name: Test seed data application
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_niffyinsure
        run: |
          # Check if seed script exists and run it
          if [ -f "src/database/seed.ts" ]; then
            npm run seed
            echo "✅ Seed data applied successfully"
          else
            echo "ℹ️ No seed script found, skipping seed test"
          fi

      - name: Validate database schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_niffyinsure
        run: |
          # Generate schema from database and compare with expected schema
          npx prisma db pull --schema /tmp/schema-generated.prisma
          
          # Compare key parts of the schema (ignore comments and ordering)
          if ! npx prisma validate; then
            echo "::error::Generated schema does not match expected schema"
            exit 1
          fi
          echo "✅ Database schema validation passed"
